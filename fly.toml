# Fly.io configuration for ChatApp. Single-origin: the server serves the SPA at
# the root and the API under /api (see the repo-root Dockerfile).

app = "chatapp"
primary_region = "iad"

# No builder config needed: `fly deploy` auto-detects the repo-root Dockerfile.
[build]

# Run pending SQL migrations before each release is promoted. Runs the bundled
# migration runner in a one-off machine with the app's secrets (DATABASE_URL); a
# non-zero exit aborts the deploy, so a bad migration never goes live.
[deploy]
  release_command = "node apps/server/dist/db/migrate.js"

[http_service]
  internal_port = 8080
  force_https = true
  # ⚠️ v1 must run a SINGLE machine: the WebSocket fan-out (ws/hub) and the
  # rate-limit counters are per-process/in-memory. Running >1 machine silently
  # breaks cross-machine messaging AND weakens rate limits to N× the cap. If you
  # do scale out, set RATE_LIMIT_MACHINE_COUNT to the machine count (it divides
  # the global caps — see "Rate limiting" in apps/server/CLAUDE.md), and move the
  # hub to a pub/sub layer. auto_start_machines only starts machines you've
  # provisioned via `fly scale count`, so keeping that at 1 keeps N = 1.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  # Liveness probe Fly uses to gate a deploy and restart a wedged machine.
  # /healthz stays at the root (no DB touch) precisely for this.
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
