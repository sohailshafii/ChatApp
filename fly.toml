# Fly.io configuration for ChatApp. Single-origin: the server serves the SPA at
# the root and the API under /api (see the repo-root Dockerfile).

app = "chatapp"
primary_region = "iad"

# No builder config needed: `fly deploy` auto-detects the repo-root Dockerfile.
[build]

# Run pending SQL migrations before each release is promoted. Runs the bundled
# migration runner in a one-off machine with the app's secrets (DATABASE_URL); a
# non-zero exit aborts the deploy, so a bad migration never goes live.
[deploy]
  release_command = "node apps/server/dist/db/migrate.js"

[http_service]
  internal_port = 8080
  force_https = true
  # ⚠️ v1 must run a SINGLE machine: the WebSocket fan-out (ws/hub) is
  # per-process/in-memory, so >1 machine silently breaks cross-machine messaging.
  # (Rate limits are already fleet-safe when REDIS_URL is set — they share a Redis
  # counter — but the hub is the remaining blocker.) Moving the hub to a pub/sub
  # layer is the last step before N>1; see docs/multi-machine.md. auto_start_machines
  # only starts machines you've provisioned via `fly scale count`, so keeping that
  # at 1 keeps N = 1.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  # Liveness probe Fly uses to gate a deploy and restart a wedged machine.
  # /healthz stays at the root (no DB touch) precisely for this.
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
