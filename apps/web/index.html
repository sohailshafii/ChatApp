<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: on supporting mobile browsers the
         soft keyboard shrinks the layout viewport, so the full-height app fits
         above it and the composer stays pinned (rather than sitting behind the
         keyboard). Harmless where unsupported (e.g. iOS Safari handles it via
         its own scroll-into-view). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <title>ChatApp</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash. 'system'
      // (and anything unset) resolves from the OS preference. Kept in sync at
      // runtime by ThemeToggle.
      (function () {
        try {
          var t = localStorage.getItem('chatapp-theme') || 'system';
          var dark =
            t === 'dark' ||
            (t !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
