services:
  postgres:
    image: postgres:16-alpine
    container_name: chatapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_dev
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - chatapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  chatapp_postgres_data:
